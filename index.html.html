<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trustra | AI Fake News Detection</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(15, 18, 25, 0.8);
            --accent-primary: #7c4dff; /* Deep Purple */
            --accent-secondary: #00e5ff; /* Neon Blue */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #00e676;
            --danger: #ff5252;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a1033, #05070a);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Navbar --- */
        nav {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Main Layout --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Card Design --- */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        .header-section h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .header-section p {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        /* --- Input Area --- */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem;
            color: white;
            font-size: 1rem;
            resize: none;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .char-counter {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        /* --- Buttons --- */
        .button-wrapper {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);
            flex: 2;
            justify-content: center;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            flex: 1;
            justify-content: center;
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* --- Loader --- */
        #loader {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-secondary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Result Area --- */
        #result-area {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid transparent;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-real { border-color: var(--success) !important; color: var(--success); }
        .result-fake { border-color: var(--danger) !important; color: var(--danger); }

        .result-header {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .confidence-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            width: 0%;
            transition: width 1s ease-in-out;
        }

        .action-links {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .copy-btn:hover { color: white; }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card { padding: 1.5rem; }
            .header-section h1 { font-size: 1.8rem; }
            .button-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo"><i class="fas fa-shield-halved"></i> TRUSTRA</div>
        <div class="nav-links">
            <span style="font-size: 0.8rem; color: var(--accent-secondary);">v2.0 AI Engine</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="container">
            <div class="card">
                <div class="header-section">
                    <h1>Verify the Truth</h1>
                    <p>AI-powered Fake News Detection System</p>
                </div>

                <!-- Input Section -->
                <div class="input-group">
                    <textarea id="newsInput" placeholder="Paste news article content or headline here..."></textarea>
                    <div class="char-counter"><span id="charCount">0</span> characters</div>
                </div>

                <!-- Action Buttons -->
                <div class="button-wrapper">
                    <button class="btn btn-primary" onclick="analyzeNews()" id="analyzeBtn">
                        <i class="fas fa-microchip"></i> Analyze News
                    </button>
                    <button class="btn btn-reset" onclick="resetForm()">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>

                <!-- Loader -->
                <div id="loader"></div>

                <!-- Result Display -->
                <div id="result-area">
                    <div id="resultStatus" class="result-header"></div>
                    <p id="confidenceText" style="font-size: 0.9rem; color: var(--text-dim);"></p>
                    <div class="confidence-bar">
                        <div id="confidenceFill" class="confidence-fill"></div>
                    </div>
                    <div class="action-links">
                        <button class="copy-btn" onclick="copyResult()">
                            <i class="far fa-copy"></i> Copy Report
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        Developed by <strong>Team Trustra</strong> &copy; 2026
    </footer>

    <script>
        const newsInput = document.getElementById('newsInput');
        const charCount = document.getElementById('charCount');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('result-area');
        const resultStatus = document.getElementById('resultStatus');
        const confidenceText = document.getElementById('confidenceText');
        const confidenceFill = document.getElementById('confidenceFill');

        // Character Counter Logic
        newsInput.addEventListener('input', () => {
            charCount.innerText = newsInput.value.length;
        });

        // Simulate AI Analysis
        function analyzeNews() {
            const text = newsInput.value.trim();
            
            if (text.length < 20) {
                alert("Please enter a longer text for more accurate AI analysis.");
                return;
            }

            // UI State Change
            analyzeBtn.disabled = true;
            resultArea.style.display = 'none';
            loader.style.display = 'block';

            // Simulate Network/Processing Delay
            setTimeout(() => {
                loader.style.display = 'none';
                analyzeBtn.disabled = false;
                
                // Demo Logic: Randomly determine if real or fake for UI purposes
                const isReal = Math.random() > 0.5;
                const confidence = Math.floor(Math.random() * (99 - 85 + 1) + 85);

                displayResult(isReal, confidence);
            }, 2000);
        }

        function displayResult(isReal, confidence) {
            resultArea.style.display = 'block';
            
            if (isReal) {
                resultArea.className = 'result-real';
                resultStatus.innerHTML = 'Real News <i class="fas fa-check-circle"></i>';
                confidenceFill.style.background = 'var(--success)';
            } else {
                resultArea.className = 'result-fake';
                resultStatus.innerHTML = 'Fake News <i class="fas fa-exclamation-triangle"></i>';
                confidenceFill.style.background = 'var(--danger)';
            }

            confidenceText.innerText = `AI Confidence: ${confidence}%`;
            
            // Trigger bar animation
            setTimeout(() => {
                confidenceFill.style.width = confidence + '%';
            }, 100);
        }

        function resetForm() {
            newsInput.value = '';
            charCount.innerText = '0';
            resultArea.style.display = 'none';
            confidenceFill.style.width = '0%';
        }

        function copyResult() {
            const status = resultStatus.innerText;
            const confidence = confidenceText.innerText;
            const textToCopy = `Trustra AI Report: ${status} | ${confidence}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Result copied to clipboard!");
            });
        }
    </script>
</body>
</html>
